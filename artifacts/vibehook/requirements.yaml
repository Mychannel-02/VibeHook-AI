packages:
  "framer-motion": "For premium glowing animations, floating orbs, and staggered page transitions"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"
  "@hookform/resolvers": "Zod validation for react-hook-form"
  "react-hook-form": "Form state management"
  "zod": "Schema validation for form"

notes:
  - App is entirely frontend-only.
  - Gemini API calls are made directly from the browser using native fetch.
  - Uses framer-motion for high-end SaaS animations.
